<!DOCTYPE html>
<html>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f172a, #000000);
        font-family: Arial, sans-serif;
    }

    #card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 30px;
        border-radius: 16px;
        width: 420px;
        box-shadow: 0 0 30px rgba(0, 255, 200, 0.08);
        text-align: center;
    }

    h1 {
        color: #00ffd5;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    input {
        width: 90%;
        padding: 12px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    #barContainer {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        overflow: hidden;
        margin-top: 10px;
    }

    #strengthBar {
        height: 100%;
        width: 0%;
        background-color: red;
        transition: width 0.4s ease, background-color 0.4s ease;
    }

    #result {
        margin-top: 15px;
        font-size: 16px;
        font-weight: bold;
    }

    #tip {
        margin-top: 10px;
        font-size: 13px;
        color: rgba(255,255,255,0.7);
    }

    .glow {
        text-shadow: 0 0 10px rgba(0,255,213,0.5);
    }
</style>
<body>
<div id="card">
<h1>CyberGuardAI</h1>
<input
    type="password"
    id="password"
    placeholder="Enter Password"
    oninput="checkPassword()">
<div id="barContainer">
    <div id="strengthBar"></div>
</div>
<p id="result"></p>
<p id="tip"></p>
<p id="scan"></p>
<script>

    function checkPassword() {
        let entropy =0;
        let commonPasswords=["123456","password","qwerty","1111111","abc123"];
        let passwordBox =
            document.getElementById("password");
        let tip = document.getElementById("tip");
        let scan= document.getElementById("scan");
        scan.textContent="Scanning password... ";
        let result= document.getElementById("result");
        let strengthBar=document.getElementById("strengthBar");        let password = passwordBox.value;
        let score=0;
        let message="";
        let hasNumber=false;
        let hasUpper=false;
        let hasLower= false;
        let securityLevel = "";

        let hasSpecial=false;
        entropy= entropy+ password.length*4;
        let isCommon = commonPasswords.includes(password);
        if (hasLower) entropy += 5;
        if (hasUpper) entropy += 5;
        if (hasNumber) entropy += 5;
        if (hasSpecial) entropy += 10;
        if (password.length==0){
            strengthBar.style.width="0%";
            strengthBar.style.backgroundColor="gray";
            result.innerHTML="Enter a password";
            result.style.color="gray";
            return;
        }
        for (let i = 0; i < password.length; i++) {
            let ch = password[i];
            if(ch>="A"&&ch<="Z"){
                hasUpper=true;
            }
            if(ch=="!"||ch=="@"||ch=="#"||ch=="$"||ch=="%"||ch=="^"||ch=="&"||ch=="*"){
                hasSpecial=true;
            }
            if(ch>="a"&& ch<="z"){
                hasLower=true;
            }
            
            if(ch>="0"&& ch<= "9"){
                hasNumber=true;
            }
        }
        let longEnough= password.length >= 8;
        if(entropy<30){
            securityLevel="CRITICAL";

        } else if (entropy <50){
            securityLevel="WEAK";
        } else if (entropy<70){
            securityLevel="MID";

        }else{
            securityLevel="STRONG";
        }
        if(longEnough){
            score++;
        }
        if(hasLower){
            score++;
        }
        if(hasSpecial){
            score++;
        }
        if(hasNumber){
            score++;
        }
        if(hasUpper){
            score++;
        }
        if (isCommon) {
        score = 0;
        message=" This is a commonly used password. Choose something which is more secure.<br>";
        }
    if (password.length < 8) {
        message += "• Make password at least 8 characters<br>";
    }

    if (!hasNumber) {
        message += "• Add at least one number<br>";
    }

    if (!hasUpper) {
        message += "• Add an uppercase letter<br>";
    }

    if (!hasSpecial) {
        message += "• Add a special character (!@#$%^&*)<br>";
    }
    if (isCommon) {
        message = "⚠️ This is a commonly used password. Choose something more secure.<br>";
    }
        strengthBar.style.width=(score*20)+"%";

        console.log(longEnough);
        console.log("Password is: ", password);
        setTimeout(() => {
        scan.textContent = "";
            if (score <= 1) {
            result.innerHTML += "<br>Security Level: " + securityLevel;
            result.innerHTML = "Weak Password<br>"+message;
            result.style.color= "red";
            result.classList.add("glow");
            strengthBar.style.backgroundColor="red";
            tip.textContent="Tip: Use 12+ characters with mixed symbols. ";
        } else if (score == 2) {
            result.innerHTML += "<br>Security Level: " + securityLevel;
            result.innerHTML = "Medium Password<br>"+message;
            result.style.color="orange";
            result.classList.add("glow");
            strengthBar.style.backgroundColor="orange";
            tip.textContent="Tip: Add uppercase + numbers for better security. ";

        } else {
            result.innerHTML += "<br>Security Level: " + securityLevel;
            result.innerHTML = "Strong Password<br>"+message;
            result.style.color="green";
            result.classList.add("glow");
            strengthBar.style.backgroundColor="green";
            tip.textContent="Great Password";

        }
            // ALL your existing result code goes here
        }, 500);
        
    }
</script>
</div>
</body>
</html>

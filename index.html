<!DOCTYPE html>
<html>
<body>
<h1>CyberGuardAI</h1>
<input
    type="password"
    id="password"
    placeholder="Enter Password">
<br>
<button onclick="checkPassword()">
    Check Strength
</button>
<p id="result"></p>
<script>
    console.log("Hello");
    function checkPassword() {
        
        let passwordBox =
            document.getElementById("password");
        let password = passwordBox.value;
        let score=0;
        let longEnough= password.length >= 8;
        console.log(longEnough);
        let result= document.getElementById("result");
        console.log("Password is: ", password);
        if (longEnough){
            result.textContent =
                "Password is long enough";
                score++;
        }else{
            result.textContent="Password is too short";
        }
        console.log(score)
    }
</script>
</body>
</html>

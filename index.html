<!DOCTYPE html>
<html>
<style>
    #strengthBar{
        height:20px;
        width: 0%;
        background-color: red;
        transition: width 0.4s ease, background-color 0.4s ease;
        margin-top: 10px;
    }
    body{
        background-color: #000000;
        display:flex;
        flex-direction: column;
        align-items: center;
    }
    h1{
        color: #1f2937;
        font-family: Arial, sans-serif;
    }
    input{
        padding: 10px;
        width: 300px;
        font-size: 16px;
    }
    #card {
        background-color: white;

        padding: 30px;

        border-radius: 12px;

        width: 400px;

        margin-top: 50px;
    }
    #barContainer {
        width: 300px;
        height: 20px;

        background-color: rgb(196, 255, 236);

        border-radius: 10px;

        overflow: hidden;
    }
</style>
<body>
<div id="card">
<h1>CyberGuardAI</h1>
<input
    type="password"
    id="password"
    placeholder="Enter Password"
    oninput="checkPassword()">
<div id="barContainer">
    <div id="strengthBar"></div>
</div>
<p id="result"></p>
<p id="tip"></p>
<script>

    function checkPassword() {
        let commonPasswords=["123456","password","qwerty","1111111","abc123"];
        let isCommon = commonPasswords.includes(password);
        let hasLower= false;
        let passwordBox =
            document.getElementById("password");
        let tip = document.getElementById("tip");

        let result= document.getElementById("result");
        let strengthBar=document.getElementById("strengthBar");        let password = passwordBox.value;
        let score=0;
        let message="";
        let hasNumber=false;
        let hasUpper=false;
        let hasSpecial=false;
        if (password.length==0){
            strengthBar.style.width="0%";
            strengthBar.style.backgroundColor="gray";
            result.innerHTML="Enter a password";
            result.style.color="gray";
            return;
        }
        for (let i = 0; i < password.length; i++) {
            let ch = password[i];
            if(ch>="A"&&ch<="Z"){
                hasUpper=true;
            }
            if(ch=="!"||ch=="@"||ch=="#"||ch=="$"||ch=="%"||ch=="^"||ch=="&"||ch=="*"){
                hasSpecial=true;
            }
            if(ch>="a"&& ch<="z"){
                hasLower=true;
            }
            
            if(ch>="0"&& ch<= "9"){
                hasNumber=true;
            }
        }
        let longEnough= password.length >= 8;

        if(longEnough){
            score++;
        }
        if(hasLower){
            score++;
        }
        if(hasSpecial){
            score++;
        }
        if(hasNumber){
            score++;
        }
        if(hasUpper){
            score++;
        }
        if (isCommon) {
        score = 0;
        }
    if (password.length < 8) {
        message += "• Make password at least 8 characters<br>";
    }

    if (!hasNumber) {
        message += "• Add at least one number<br>";
    }

    if (!hasUpper) {
        message += "• Add an uppercase letter<br>";
    }

    if (!hasSpecial) {
        message += "• Add a special character (!@#$%^&*)<br>";
    }
    if (isCommon) {
        message = "⚠️ This is a commonly used password. Choose something more secure.<br>";
    }
        strengthBar.style.width=(score*20)+"%";

        console.log(longEnough);
        console.log("Password is: ", password);
        if (score <= 1) {
            result.innerHTML = "Weak Password<br>"+message;
            result.style.color= "red";
            strengthBar.style.backgroundColor="red";
            tip.textContent="Tip: Use 12+ characters with mixed symbols. ";
        } else if (score == 2) {
            result.innerHTML = "Medium Password<br>"+message;
            result.style.color="orange";
            strengthBar.style.backgroundColor="orange";
            tip.textContent="Tip: Add uppercase + numbers for better security. ";

        } else {
            result.innerHTML = "Strong Password<br>"+message;
            result.style.color="green";
            strengthBar.style.backgroundColor="green";
            tip.textContent="Great Password";

        }
    }
</script>
</div>
</body>
</html>
